<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Project Shield — AI-Powered Cybersecurity Analytics Dashboard by CFSS"/>
  <title>Project Shield | Login — CFSS Security</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── Login-specific styles ─────────────────────────────────── */
    body { overflow: hidden; }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated grid background */
    .grid-bg {
      position: fixed; inset: 0;
      background:
        linear-gradient(rgba(0,255,213,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,213,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 40px 40px; }
    }

    /* Particles canvas */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    /* Glowing orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.15; pointer-events: none;
    }
    .orb-1 { width:500px; height:500px; background:var(--cyan); top:-150px; left:-150px; animation: float1 8s ease-in-out infinite; }
    .orb-2 { width:400px; height:400px; background:var(--purple); bottom:-100px; right:-100px; animation: float2 10s ease-in-out infinite; }
    .orb-3 { width:300px; height:300px; background:var(--red); top:40%; left:50%; transform:translate(-50%,-50%); animation: float3 7s ease-in-out infinite; }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
    @keyframes float3 { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-50%,-60%)} }

    /* Login card */
    .login-card {
      position: relative; z-index: 10;
      background: rgba(10,14,26,0.85);
      border: 1px solid rgba(0,255,213,0.2);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,255,213,0.06), 0 30px 60px rgba(0,0,0,0.5);
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(40px) scale(0.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .login-logo {
      text-align: center; margin-bottom: 32px;
    }
    .shield-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(0,255,213,0.3);
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100%{ box-shadow: 0 0 30px rgba(0,255,213,0.3); }
      50%    { box-shadow: 0 0 50px rgba(0,255,213,0.6); }
    }

    .login-logo h1 { font-size: 1.5rem; font-weight: 800; margin: 0; }
    .login-logo p  { color: var(--text-muted); font-size: 0.8rem; margin: 6px 0 0; letter-spacing: 0.1em; text-transform: uppercase; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 1rem; pointer-events: none;
    }
    .form-control {
      width: 100%; padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      transition: all 0.3s;
      outline: none;
      box-sizing: border-box;
    }
    .form-control:focus {
      border-color: var(--cyan);
      background: rgba(0,255,213,0.04);
      box-shadow: 0 0 0 3px rgba(0,255,213,0.1);
    }
    .form-control::placeholder { color: rgba(255,255,255,0.2); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--cyan) 0%, #00b4d8 100%);
      border: none;
      border-radius: 10px;
      color: #0a0e1a;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      position: relative; overflow: hidden;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,255,213,0.4); }
    .btn-login:active { transform: translateY(0); }
    .btn-login .btn-ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0); animation: ripple 0.6s linear;
      pointer-events: none;
    }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    .login-footer {
      text-align: center; margin-top: 28px;
      color: var(--text-muted); font-size: 0.78rem;
    }
    .credentials-hint {
      background: rgba(0,255,213,0.05);
      border: 1px solid rgba(0,255,213,0.15);
      border-radius: 8px; padding: 10px 14px;
      font-family: var(--mono); font-size: 0.75rem;
      color: var(--cyan); margin-top: 20px;
    }

    .error-msg {
      color: var(--red); font-size: 0.82rem;
      margin-top: 8px; display: none;
      animation: shake 0.4s ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
    }

    .loading-spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(10,14,26,0.3);
      border-top-color: #0a0e1a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="grid-bg"></div>
    <canvas id="particles"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-card">
      <div class="login-logo">
        <div class="shield-icon">🛡️</div>
        <h1 class="gradient-text">PROJECT SHIELD</h1>
        <p>AI-Powered Security Analytics — CFSS 2026</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" class="form-control"
                   placeholder="Enter username" autocomplete="off" required/>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="password" class="form-control"
                   placeholder="Enter password" required/>
          </div>
        </div>

        <div class="error-msg" id="errorMsg">⚠️ Invalid credentials. Please try again.</div>

        <button type="submit" class="btn-login" id="loginBtn">
          ACCESS DASHBOARD
        </button>
      </form>

      <div class="credentials-hint">
        <div>🔐 Demo Credentials</div>
        <div style="margin-top:6px">admin / Shield@2026</div>
        <div>analyst / Cfss@2026</div>
      </div>

      <div class="login-footer">
        CFSS Global Internship 2026 &nbsp;·&nbsp; Secured with JWT
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // ── Particle system ────────────────────────────────────────────────────
    (function() {
      const canvas = document.getElementById("particles");
      const ctx    = canvas.getContext("2d");
      let particles = [];
      let W, H;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      for (let i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          r: Math.random() * 1.5 + 0.5,
          a: Math.random() * 0.6 + 0.2
        });
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,255,213,${p.a})`;
          ctx.fill();
        });
        // Draw connections
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(0,255,213,${0.15 * (1 - dist/120)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ── Login form ─────────────────────────────────────────────────────────
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn      = document.getElementById("loginBtn");
      const errorMsg = document.getElementById("errorMsg");
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      btn.innerHTML = '<span class="loading-spinner"></span> AUTHENTICATING...';
      btn.disabled  = true;
      errorMsg.classList.remove("show");

      const ok = await AuthManager.login(username, password);
      if (ok) {
        btn.innerHTML = "✓ ACCESS GRANTED";
        btn.style.background = "linear-gradient(135deg, #00ff8c, #00cc70)";
        setTimeout(() => { window.location.href = "dashboard.html"; }, 600);
      } else {
        btn.innerHTML = "ACCESS DASHBOARD";
        btn.disabled  = false;
        errorMsg.classList.add("show");
      }
    });

    // Ripple effect
    document.querySelector(".btn-login").addEventListener("click", function(e) {
      const ripple = document.createElement("span");
      ripple.className = "btn-ripple";
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  </script>
</body>
</html>
